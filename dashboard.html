<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>Business Management</h2>

        <nav>
          <a href="#">Dashboard</a>
          <a href="#">Users</a>
          <a href="#">Businesses</a>
          <a href="statements.html">Statements</a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Header -->
        <div class="top-bar">
          <div>
            <label>Select Business</label>

            <select id="businessDropdown" onchange="onBusinessChange()">
              <option>Loading...</option>
            </select>
          </div>

          <div class="user-box">
            <span id="userName"></span>

            <span id="userType"></span>

            <button onclick="logout()">Logout</button>
          </div>
        </div>

        <div class="dashboard-content">
          <!-- Summary Cards -->
          <div class="cards">
            <div class="card">
              <h3>Total Income</h3>
              <p id="totalIncome">₹0</p>
            </div>

            <div class="card">
              <h3>Total Expenditure</h3>
              <p id="totalExpenditure">₹0</p>
            </div>

            <div class="card">
              <h3>Fund Balance</h3>
              <p id="currentFund">₹0</p>
            </div>

            <div class="card">
              <h3>Profit/Loss</h3>
              <p id="profitLoss">₹0</p>
            </div>
          </div>

          <!-- Statements Table -->
          <div class="statement-section">
            <h2>Recent Transactions</h2>

            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Subject</th>
                  <th>Transaction By</th>
                  <th>Note</th>
                  <th>Updated At</th>
                </tr>
              </thead>

              <tbody id="statementTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
